name: Build & Deploy

on:
  push:
    branches: [main]
    tags: ['v*']

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/${{ github.repository_owner }}
  PULUMI_WORKING_DIR: infra/applications/storehub

jobs:
  build:
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write
    outputs:
      tag: ${{ steps.tag.outputs.tag }}

    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Determine tag
        id: tag
        run: |
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          echo "tag=${SHORT_SHA}" >> $GITHUB_OUTPUT

      - name: Build & push API
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/api.Dockerfile
          target: production
          push: true
          platforms: linux/amd64
          tags: ${{ env.IMAGE_PREFIX }}/storehub-api:${{ steps.tag.outputs.tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & push Web
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/web.Dockerfile
          target: production
          push: true
          platforms: linux/amd64
          tags: ${{ env.IMAGE_PREFIX }}/storehub-web:${{ steps.tag.outputs.tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & push Migrate
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/migrate.Dockerfile
          push: true
          platforms: linux/amd64
          tags: ${{ env.IMAGE_PREFIX }}/storehub-migrate:${{ steps.tag.outputs.tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy-staging:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Pulumi CLI
        run: curl -fsSL https://get.pulumi.com | sh && echo "$HOME/.pulumi/bin" >> $GITHUB_PATH

      - name: Install infra dependencies
        run: cd infra && npm install

      - name: Configure kubeconfig
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBECONFIG }}" | base64 -d > ~/.kube/config
          chmod 600 ~/.kube/config

      - name: Deploy to staging
        env:
          PULUMI_ACCESS_TOKEN: ${{ secrets.PULUMI_ACCESS_TOKEN }}
        run: |
          cd ${{ env.PULUMI_WORKING_DIR }}
          pulumi stack select staging
          pulumi config set version ${{ needs.build.outputs.tag }}
          pulumi config set migrationsVersion ${{ needs.build.outputs.tag }}
          pulumi up --yes --skip-preview

  promote-prod:
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Determine source tag
        id: source
        run: |
          # The tag points to a commit — use its short SHA as the source image tag
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          VERSION="${GITHUB_REF#refs/tags/}"
          echo "sha_tag=${SHORT_SHA}" >> $GITHUB_OUTPUT
          echo "version=${VERSION}" >> $GITHUB_OUTPUT

      - name: Re-tag images for production
        run: |
          SHA_TAG="${{ steps.source.outputs.sha_tag }}"
          VERSION="${{ steps.source.outputs.version }}"

          for IMAGE in storehub-api storehub-web storehub-migrate; do
            echo "Promoting ${IMAGE}:${SHA_TAG} → ${IMAGE}:${VERSION}"
            docker pull ${{ env.IMAGE_PREFIX }}/${IMAGE}:${SHA_TAG}
            docker tag ${{ env.IMAGE_PREFIX }}/${IMAGE}:${SHA_TAG} ${{ env.IMAGE_PREFIX }}/${IMAGE}:${VERSION}
            docker push ${{ env.IMAGE_PREFIX }}/${IMAGE}:${VERSION}
          done

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Pulumi CLI
        run: curl -fsSL https://get.pulumi.com | sh && echo "$HOME/.pulumi/bin" >> $GITHUB_PATH

      - name: Install infra dependencies
        run: cd infra && npm install

      - name: Configure kubeconfig
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBECONFIG }}" | base64 -d > ~/.kube/config
          chmod 600 ~/.kube/config

      - name: Deploy to production
        env:
          PULUMI_ACCESS_TOKEN: ${{ secrets.PULUMI_ACCESS_TOKEN }}
        run: |
          cd ${{ env.PULUMI_WORKING_DIR }}
          pulumi stack select prod
          pulumi config set version ${{ steps.source.outputs.version }}
          pulumi config set migrationsVersion ${{ steps.source.outputs.version }}
          pulumi up --yes --skip-preview
